name: Build Signed IPA

on:
  workflow_dispatch:
  push:
    branches: ["main"]


jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install signing assets
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e

          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > cert.p12
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          security import cert.p12 \
            -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace Thunderbird.xcworkspace \
            -scheme Thunderbird

      - name: Archive (signed, fast)
        run: |
          xcodebuild archive \
            -workspace Thunderbird.xcworkspace \
            -scheme Thunderbird \
            -configuration Debug \
            -archivePath build/Thunderbird.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE=b2553429-fe3a-4935-bd19-45e3ba0d8e47 \
            PRODUCT_BUNDLE_IDENTIFIER=app.emerald4137.panther5681 \
            -parallelizeTargets \
            -jobs 4

      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Thunderbird.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Thunderbird-ipa
          path: build/*.ipaname: Build Signed IPA

